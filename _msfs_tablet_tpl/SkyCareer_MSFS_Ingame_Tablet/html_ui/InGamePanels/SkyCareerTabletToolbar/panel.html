<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SkyCareer Tablet</title>
  <link rel="stylesheet" href="./panel.css" />
</head>
<body>
  <div id="frameWrap">
    <iframe id="skycareerFrame" title="SkyCareer" src="https://aero-career-pilot.base44.app" allow="clipboard-read; clipboard-write"></iframe>
    <div id="SkyCareerWeatherPanel" role="button" tabindex="0" aria-label="SkyCareer weather panel">
      <div class="weatherHeader">
        <span class="weatherBrand">SC</span>
        <span class="weatherTopline">
          <span id="SkyCareerWeatherState" class="weatherDot isIdle"></span>
          <span id="SkyCareerWeatherTitle">SkyCareer Weather</span>
        </span>
        <button id="SkyCareerWeatherClose" type="button" aria-label="Close weather panel">X</button>
      </div>
      <span id="SkyCareerWeatherPreset">Click to load preset</span>
      <span id="SkyCareerWeatherHint">Click once after setting mission weather.</span>
    </div>
  </div>
  <script src="./panel.js"></script>
</body>
</html>
