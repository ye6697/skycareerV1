<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/SCSS/common.css" />
    <link rel="stylesheet" href="SkyCareerWeather.v2.css" />
    <script type="text/javascript" src="/JS/coherent.js"></script>
    <script type="text/javascript" src="/JS/common.js"></script>
    <script type="text/javascript" src="/JS/Services/ToolBarPanels.js"></script>
    <link rel="import" href="/templates/ingameUi/ingameUi.html" />
    <script type="text/javascript" src="SkyCareerWeather.v2.js"></script>
</head>
<body class="border-box">
    <ingamepanel-custom>
        <ingame-ui id="CustomPanel" panel-id="PANEL_CUSTOM_PANEL" title="SC" class="ingameUiFrame panelInvisible" content-fit="true" min-width="176" min-height="126">
            <div id="SkyCareerPanel">
                <div class="panel-header">
                    <span class="brand-chip">SC</span>
                    <div>
                        <h2>Weather</h2>
                        <p>SkyCareer bridge</p>
                    </div>
                    <button id="WeatherPanelClose" class="close-btn" type="button" aria-label="Close">X</button>
                </div>
                <div class="status-grid">
                    <div><span>Bridge</span><strong id="BridgeState">waiting</strong></div>
                    <div><span>Preset</span><strong id="PresetState">none</strong></div>
                </div>
                <div class="apply-row">
                    <strong id="WeatherApplyState">idle</strong>
                    <button id="ApplySkyCareerWeather" class="sc-btn primary">Apply</button>
                </div>
                <div id="SkyCareerStatus">Bereit</div>
            </div>
        </ingame-ui>
    </ingamepanel-custom>
</body>
</html>
